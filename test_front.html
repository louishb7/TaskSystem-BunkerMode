<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BunkerMode Test Front</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f4f4f4;
      color: #222;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    .bloco {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    input, button, textarea {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <h1>BunkerMode - Front de Teste</h1>

  <div class="bloco">
    <h2>Cadastro</h2>
    <input id="cadastro-usuario" type="text" placeholder="Usuário">
    <input id="cadastro-email" type="email" placeholder="Email">
    <input id="cadastro-senha" type="password" placeholder="Senha">
    <button id="btn-cadastrar">Cadastrar</button>
  </div>

  <div class="bloco">
    <h2>Login</h2>
    <input id="login-email" type="email" placeholder="Email">
    <input id="login-senha" type="password" placeholder="Senha">
    <button id="btn-login">Login</button>
  </div>

  <div class="bloco">
    <h2>Criar missão</h2>
    <input id="missao-titulo" type="text" placeholder="Título">
    <textarea id="missao-descricao" placeholder="Descrição"></textarea>
    <input id="missao-prioridade" type="number" placeholder="Prioridade">
    <input id="missao-prazo" type="date">
    <button id="btn-criar-missao">Criar missão</button>
  </div>

  <div class="bloco">
    <h2>Missões</h2>
    <button id="btn-listar-missoes">Listar missões</button>
    <ul id="lista-missoes"></ul>
  </div>

  <div class="bloco">
    <h2>Resposta da API</h2>
    <pre id="saida"></pre>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    let token = "";

    const saida = document.getElementById("saida");
    const listaMissoes = document.getElementById("lista-missoes");

    function mostrarSaida(dados) {
      saida.textContent = JSON.stringify(dados, null, 2);
    }

    document.getElementById("btn-cadastrar").addEventListener("click", async () => {
      const usuario = document.getElementById("cadastro-usuario").value;
      const email = document.getElementById("cadastro-email").value;
      const senha = document.getElementById("cadastro-senha").value;

      const resposta = await fetch(`${API_BASE}/api/v2/auth/register`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          usuario,
          email,
          senha
        })
      });

      const dados = await resposta.json();
      mostrarSaida(dados);
    });

    document.getElementById("btn-login").addEventListener("click", async () => {
      const email = document.getElementById("login-email").value;
      const senha = document.getElementById("login-senha").value;

      const resposta = await fetch(`${API_BASE}/api/v2/auth/login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email,
          senha
        })
      });

      const dados = await resposta.json();
      mostrarSaida(dados);

      token = dados.access_token || "";
    });

    document.getElementById("btn-criar-missao").addEventListener("click", async () => {
      const titulo = document.getElementById("missao-titulo").value;
      const descricao = document.getElementById("missao-descricao").value;
      const prioridade = Number(document.getElementById("missao-prioridade").value);
      const prazo = document.getElementById("missao-prazo").value;

      const resposta = await fetch(`${API_BASE}/api/v2/missoes`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({
          titulo,
          descricao,
          prioridade,
          prazo
        })
      });

      const dados = await resposta.json();
      mostrarSaida(dados);
    });

    document.getElementById("btn-listar-missoes").addEventListener("click", async () => {
      const resposta = await fetch(`${API_BASE}/api/v2/missoes`, {
        method: "GET",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      const dados = await resposta.json();
      mostrarSaida(dados);

      listaMissoes.innerHTML = "";

      dados.forEach((missao) => {
        const item = document.createElement("li");
        item.textContent = `${missao.titulo} - prioridade ${missao.prioridade}`;
        listaMissoes.appendChild(item);
      });
    });
  </script>
</body>
</html>
